name: mavrx-post

# Daily autonomous IG + FB post. 17:00 UTC = 20:00 Asia/Riyadh (best KSA engagement).
# GitHub cron is best-effort and can run a few minutes late — fine for a social post.
on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — pick + caption but do NOT publish'
        type: boolean
        default: false
      force:
        description: 'Ignore the same-day gate'
        type: boolean
        default: false

permissions:
  contents: write   # commit state.json back to the repo

# Share one group with mavrx-engage so the two never push to main at the same time.
concurrency:
  group: mavrx-autopilot-state
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily post
        env:
          META_SECRETS_JSON: ${{ secrets.META_SECRETS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAVRX_STATE_DIR: ${{ github.workspace }}/state
          DRY_RUN: ${{ inputs.dry_run }}
          FORCE_RUN: ${{ inputs.force }}
        run: node src/post.js

      - name: Commit state
        if: always()
        run: |
          git config user.name "mavrx-autopilot[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then echo "no state change"; exit 0; fi
          git commit -m "state: post $(date -u +%FT%TZ)"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push
